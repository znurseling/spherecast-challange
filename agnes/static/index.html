<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Agnes — AI Supply Chain Manager. Conversational interface for CPG sourcing optimization.">
  <title>Agnes — AI Supply Chain Manager</title>
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="icon" href="/static/logo.png" type="image/png">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-icon">
          <img src="/static/logo.png" alt="Agnes logo">
        </div>
        <div class="logo-text">
          <h1>Agnes</h1>
          <p>Supply Chain AI</p>
        </div>
      </div>
      <div class="sidebar-stats" id="sidebarStats">
        <a href="#" id="btnAskAgnes" class="btn-inventory">
          Ask Agnes
        </a>
        <a href="#" id="btnViewInventory" class="btn-inventory">
          View Inventory
        </a>
      </div>
      <div class="sidebar-footer">
        <div class="status-badge">
          <div class="status-dot"></div>
          <span id="statusText">Connecting…</span>
        </div>
      </div>
    </aside>

    <!-- Main Chat Panel -->
    <main class="main-panel" id="chatPanel">
      <div class="chat-header">
        <div>
          <h2>Chat with Agnes</h2>
          <div class="subtitle">AI-powered sourcing decisions</div>
        </div>
      </div>

      <div class="messages-container" id="messagesContainer">
        <!-- Messages injected here -->
      </div>

      <div class="input-area">
        <div class="audio-visualizer" id="audioVisualizer">
          <div class="audio-bar"></div><div class="audio-bar"></div>
          <div class="audio-bar"></div><div class="audio-bar"></div>
          <div class="audio-bar"></div><div class="audio-bar"></div>
          <div class="audio-bar"></div>
        </div>

        <div class="input-row">
          <button class="btn-icon btn-mic" id="btnMic" title="Voice input">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
          </button>
          <input type="text" class="chat-input" id="chatInput" placeholder="Ask Agnes anything about your supply chain…" autocomplete="off">
          <button class="btn-icon btn-speaker" id="btnSpeaker" title="Toggle voice output">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
          </button>
          <button class="btn-icon btn-send" id="btnSend" title="Send">➤</button>
        </div>
      </div>
    </main>

    <!-- Inventory Panel -->
    <main class="main-panel" id="inventoryPanel" style="display: none;">
      <div class="chat-header">
        <div>
          <h2>Supplier Inventory</h2>
          <div class="subtitle">Current raw materials by supplier</div>
        </div>
      </div>
      <div class="messages-container" style="padding: 24px;" id="inventoryContainer">
        <!-- Inventory table injected here -->
      </div>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
